<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>


</head>

<body>
    <center>
        <fieldset style="width:300px; background-color:white; border-radius:10px;">
            <legend><b>Payment Option</b></legend>

                <div class="container">

                        <form action="success.html">

                            <div class="option">
                                <input type="radio" name="pay"> UPI (Google Pay / PhonePe)
                            </div>

                            <div class="option">
                                <input type="radio" name="pay"> Credit / Debit Card
                            </div>

                            <div class="option">
                                <input type="radio" name="pay"> Net Banking
                            </div>

                            <div class="option">
                                <input type="radio" name="pay"> Cash on Delivery
                            </div>

                            <br>

                            <label>Enter Details:</label><br><br>
                            <input type="text" placeholder="Enter UPI / Card Number">

                            <br><br>

                            <button type="submit">Pay Now</button>

                        </form>
                    </div>
        </fieldset>
    </center>
</body>
</html>
